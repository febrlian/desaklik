name: DesaKlik CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint --workspace desaklik

      - name: Build frontend
        run: npm run build --workspace desaklik

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace api

      - name: Lint API
        run: npm run lint --workspace api

      - name: Build API
        run: npm run build --workspace api
